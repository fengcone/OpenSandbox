---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: sandboxsnapshots.sandbox.opensandbox.io
spec:
  group: sandbox.opensandbox.io
  names:
    kind: SandboxSnapshot
    listKind: SandboxSnapshotList
    plural: sandboxsnapshots
    shortNames:
    - sbxsnap
    singular: sandboxsnapshot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: PHASE
      type: string
    - jsonPath: .spec.sandboxName
      name: SANDBOX
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SandboxSnapshotSpec defines the desired state of SandboxSnapshot.
              Pure atomic capability: caller fills spec, Controller only reads spec.
              Registry/pushSecret/snapshotType come from Controller Manager startup params.
            properties:
              sandboxName:
                description: |-
                  SandboxName is the name of the target BatchSandbox (same namespace as SandboxSnapshot).
                  Controller uses this to find BatchSandbox -> find Pod -> dispatch commit Job.
                type: string
            required:
            - sandboxName
            type: object
          status:
            description: |-
              SandboxSnapshotStatus defines the observed state of SandboxSnapshot.
              Status is written by Controller, read-only for callers.
            properties:
              containers:
                description: Containers holds per-container snapshot results, filled
                  after Ready.
                items:
                  description: ContainerSnapshot records the snapshot result for a
                    single container.
                  properties:
                    containerName:
                      description: ContainerName is the name of the container.
                      type: string
                    imageDigest:
                      description: ImageDigest is the digest of the pushed snapshot
                        image.
                      type: string
                    imageUri:
                      description: ImageURI is the snapshot image URI for this container.
                      type: string
                  required:
                  - containerName
                  - imageUri
                  type: object
                type: array
              message:
                description: Message provides human-readable status information.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent spec generation
                  observed by the Controller.
                format: int64
                type: integer
              phase:
                description: Phase indicates the current phase of the snapshot.
                enum:
                - Pending
                - Committing
                - Ready
                - Failed
                type: string
              readyAt:
                description: ReadyAt is the timestamp when the snapshot became Ready.
                format: date-time
                type: string
              sourceNodeName:
                description: SourceNodeName is the node where the source Pod runs
                  (for Job scheduling).
                type: string
              sourcePodName:
                description: SourcePodName is the name of the source Pod (resolved
                  by Controller).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
