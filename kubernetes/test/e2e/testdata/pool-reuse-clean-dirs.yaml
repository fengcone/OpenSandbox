apiVersion: sandbox.opensandbox.io/v1alpha1
kind: Pool
metadata:
  name: {{.PoolName}}
  namespace: {{.Namespace}}
spec:
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      containers:
      - name: sandbox-container
        image: {{.TaskExecutorImage}}
        command: ["/bin/sh", "-c", "sleep infinity"]
        env:
        - name: SANDBOX_MAIN_CONTAINER
          value: "sandbox-container"
        volumeMounts:
        - name: data-volume
          mountPath: /data
      volumes:
      - name: data-volume
        emptyDir: {}
  capacitySpec:
    bufferMax: 0
    bufferMin: 0
    poolMax: 1
    poolMin: 1
  # Reuse policy - pods will be reset and returned to pool
  podRecyclePolicy: Reuse
  resetSpec:
    mainContainerName: sandbox-container
    cleanDirectories:
    - /data/test-reset-*
    timeoutSeconds: 60