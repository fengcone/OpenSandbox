apiVersion: sandbox.opensandbox.io/v1alpha1
kind: SandboxSnapshot
metadata:
  name: {{.SnapshotName}}
  namespace: {{.Namespace}}
spec:
  sandboxId: {{.SandboxId}}
  sourceBatchSandboxName: {{.SourceBatchSandboxName}}
  snapshotRegistry: {{.SnapshotRegistry}}
  snapshotPushSecret: {{.SnapshotPushSecret}}
  resumeImagePullSecret: {{.ResumeImagePullSecret}}
  action: Pause
